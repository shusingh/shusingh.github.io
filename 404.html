<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting | Shubham Singh</title>
    <script>
      (function () {
        var target = window.location.pathname + window.location.search + window.location.hash;
        try {
          sessionStorage.setItem('spa:redirect', target);
        } catch (error) {
          window.location.replace('/#' + target);
          return;
        }
        window.location.replace('/');
      })();
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
